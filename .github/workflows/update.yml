name: Refresh dashboard data

on:
  schedule:
    - cron: "0 20 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Validate config + parsers (offline)
        run: |
          python tests/test_parsers.py
          python tests/test_config.py
      - name: Pull latest ABS + RBA data
        run: python fetch_data.py
      - name: Commit if data changed
        run: |
          git config user.name  "dashboard-bot"
          git config user.email "actions@github.com"
          if [[ -n "$(git status --porcelain data.json)" ]]; then
            git add data.json
            git commit -m "data: weekly refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No change in data.json"
          fi
